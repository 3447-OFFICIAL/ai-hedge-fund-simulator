apiVersion: apps/v1
kind: Deployment
metadata:
  name: hedgefund-celery-worker
  labels:
    app: hedgefund-celery
spec:
  replicas: 5 # Horizontally scaled
  selector:
    matchLabels:
      app: hedgefund-celery
  template:
    metadata:
      labels:
        app: hedgefund-celery
    spec:
      containers:
      - name: celery-worker
        image: ai-hedgefund:latest
        command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
        env:
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: vault-secrets
              key: redis-uri
        - name: POSTGRES_URI
          valueFrom:
            secretKeyRef:
              name: vault-secrets
              key: postgres-uri
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: vault-secrets
              key: openai-api-key
        resources:
          limits:
            memory: "2Gi"
            cpu: "1000m"
          requests:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hedgefund-celery-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hedgefund-celery-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
